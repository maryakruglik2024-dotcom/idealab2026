<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>IDEALAB | Студия дизайна интерьера</title>
  <link rel="stylesheet" href="style.css">
  <!-- Подключение шрифтов Google Fonts для эстетики -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="animated-gradient-bg"></div>
  
  <main class="container">
    <!-- Шапка / Логотип и контакты -->
    <header class="main-header">
      <div class="logo-area">
        <h1 class="studio-name">IDEALAB</h1>
        <p class="studio-tagline">Студия дизайна</p>
      </div>
      <div class="contacts-area">
        <a href="#" class="contacts-link">КОНТАКТЫ →</a>
      </div>
    </header>

    <!-- Герой-секция с ключевым сообщением -->
    <section class="hero">
      <div class="hero-text">
        <p class="hero-description">
          СОЗДАЕМ ИНТЕРЬЕРЫ, В КОТОРЫХ ЭСТЕТИКА ВСТРЕЧАЕТСЯ С ФУНКЦИОНАЛЬНОСТЬЮ.<br>
          МЫ НЕ ПРОСТО РИСУЕМ СТЕНЫ — МЫ ПРОЕКТИРУЕМ ВАШ НОВЫЙ ОБРАЗ ЖИЗНИ.
        </p>
      </div>
    </section>

    <!-- Сетка проектов / портфолио (только одна карточка без подписи) -->
    <section class="gallery">
      <div class="gallery-card">
        <div class="image-wrapper">
          <!-- Место для картинки: замените src на реальный путь к изображению -->
         <a href="https://freeimage.host/i/qNyQtBj"><img src="https://iili.io/qNyQtBj.md.jpg" alt="qNyQtBj.md.jpg" border="0"></a>
        </div>
        <!-- Блок с подписями полностью удалён -->
      </div>
    </section>

    <!-- Дополнительный блок контактов / вдохновения -->
    <footer class="footer-note">
      <div class="footer-left">
        <p>© IDEALAB — интерьеры, вдохновляющие на жизнь</p>
      </div>
      <div class="footer-right">
        <a href="#" class="secondary-contact">hello@idealab.studio</a>
      </div>
    </footer>
  </main>
</body>
</html>
